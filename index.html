<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BON & BI DASHBOARD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c; --bg: #f8faff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 450px; margin: auto; background: #fff; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Header & Avatar */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar { width: 60px; height: 60px; border-radius: 20px; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); object-fit: cover; }
        
        /* Score Card */
        .score-board { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; position: relative; overflow: hidden; }
        .score-board h2 { margin: 0; font-size: 2.5em; }

        /* Tasks */
        .task { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 15px; background: #fdfdfd; border: 1px solid #f0f0f0; transition: 0.3s; }
        .task.done { background: #f0fff4; border-color: #c6f6d5; }
        .task.pending { background: #fffaf0; border-color: #feebc8; }
        .task-info { flex: 1; }
        .task-info b { font-size: 0.95em; display: block; }
        .task-status { font-size: 0.7em; color: #999; font-weight: bold; }

        /* Buttons */
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-done { background: var(--primary); color: white; padding: 8px 15px; }
        .btn-redo { background: #f0f0f0; color: #888; padding: 5px 10px; font-size: 0.7em; margin-top: 4px; }

        /* Report Section - Thu nhỏ */
        .report-section { background: #fff; border-radius: 20px; padding: 10px; margin-top: 20px; border: 1px solid #eee; }
        .chart-container { position: relative; height: 180px; width: 100%; }

        /* Admin Box */
        .admin-box { background: #f9f9f9; padding: 15px; border-radius: 20px; margin-top: 20px; border: 1px dashed #ccc; }
        textarea { width: 100%; border-radius: 10px; border: 1px solid #ddd; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; background: #eee; border-radius: 8px; font-size: 0.8em; }
        .tab-active { background: var(--dark); color: white; }

        select { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; background: #fff; }
        .reward-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img id="childAvatar" class="avatar" src="">
        <div>
            <h3 id="greeting" style="margin:0">Chào con!</h3>
            <small id="displayDate" style="color:#999"></small>
        </div>
    </div>

    <select id="childSelect" onchange="render()">
        <option value="BON">👤 Bé BON</option>
        <option value="BI">👤 Bé BI</option>
    </select>

    <div class="score-board">
        <small>ĐIỂM TÍCH LŨY</small>
        <h2 id="score">0 ⭐</h2>
    </div>

    <div id="taskList"></div>

    <div style="margin-top:20px">
        <h4 style="margin-bottom:10px; font-size:0.9em">🎁 ĐỔI QUÀ</h4>
        <div id="rewardList" style="background:#fff9f0; padding:10px; border-radius:15px"></div>
    </div>

    <div class="report-section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px">
            <b style="font-size:0.8em">📊 TIẾN ĐỘ THÁNG</b>
            <small style="color:var(--primary); font-weight:bold" id="monthLabel"></small>
        </div>
        <div class="chart-container">
            <canvas id="scoreChart"></canvas>
        </div>
    </div>

    <button onclick="login()" style="background:none; color:#ccc; width:100%; margin-top:20px; font-size:0.7em">🔐 Quản lý</button>

    <div id="adminPanel" style="display:none" class="admin-box">
        <h4 style="text-align:center; margin-top:0">🛠 ADMIN PANEL</h4>
        <select id="adminChild" onchange="render()">
            <option value="BON">Cài cho BON</option>
            <option value="BI">Cài cho BI</option>
        </select>
        <div style="display:flex; gap:5px; margin-bottom:10px">
            <button onclick="showTab('config')" class="tab-btn">Cài việc</button>
            <button onclick="showTab('approve')" class="tab-btn">Duyệt việc</button>
        </div>
        <div id="configTab">
            <textarea id="tasksWeekday" rows="3" placeholder="Việc ngày thường..."></textarea>
            <textarea id="tasksWeekend" rows="3" placeholder="Việc cuối tuần..."></textarea>
            <button onclick="saveTasks()" style="background:var(--primary); color:white; width:100%; padding:10px">Lưu Cloud</button>
        </div>
        <div id="approveTab" style="display:none"><div id="approveList"></div></div>
        <button onclick="logout()" style="width:100%; margin-top:10px; background:#333; color:#fff">Đóng</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuQCluWc07QOWpAC5lGCxMeOGoujq4k8w",
  authDomain: "bon-bi.firebaseapp.com",
  projectId: "bon-bi",
  storageBucket: "bon-bi.firebasestorage.app",
  messagingSenderId: "988400970351",
  appId: "1:988400970351:web:21e9181950114225417b9a",
  databaseURL: "https://bon-bi-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let isAdmin = false, myChart = null;

const avatars = { BON: "https://i.postimg.cc/G9vhLbhg/Bon.jpg", BI: "https://i.postimg.cc/hhVPDKP0/Bi.jpg" };
let taskData = { BON: { weekday: [], weekend: [] }, BI: { weekday: [], weekend: [] } };
let logs = {}, rewards = [{text: "Kem", point: 5}, {text: "Công viên", point: 20}];

db.ref('bonbi_v6').on('value', (snap) => {
    const data = snap.val();
    if (data) { 
        if(data.taskData) taskData = data.taskData;
        if(data.logs) logs = data.logs;
    }
    render();
});

function sync() { db.ref('bonbi_v6').set({ taskData, logs, rewards }); }
function today() { return new Date().toISOString().split('T')[0]; }
function getDayType() { const d = new Date().getDay(); return (d===0 || d===6) ? 'weekend' : 'weekday'; }

function render() {
    const c = document.getElementById('childSelect').value;
    const d = today();
    document.getElementById('childAvatar').src = avatars[c];
    document.getElementById('displayDate').innerText = d;
    
    if(!logs[c]) logs[c] = {};
    if(!logs[c][d]) logs[c][d] = (taskData[c][getDayType()] || []).map(t => ({text: t, status: 'not'}));

    let h = "";
    logs[c][d].forEach((t, i) => {
        h += `<div class="task ${t.status}">
            <div class="task-info">
                <b>${t.text}</b>
                <span class="task-status">${t.status==='pending'?'Đang chờ duyệt...':t.status==='done'?'Hoàn thành':'Chưa làm'}</span>
                ${t.status==='pending' ? `<br><button class="btn-redo" onclick="action('${c}',${i},'not')">Sửa lại</button>` : ''}
            </div>
            ${t.status==='not' ? `<button class="btn-done" onclick="action('${c}',${i},'pending')">Xong</button>` : ''}
        </div>`;
    });
    document.getElementById('taskList').innerHTML = h || "<p style='text-align:center; color:#999'>Chưa có việc hôm nay</p>";

    document.getElementById('score').innerText = calcScore(c) + " ⭐";
    
    let rh = "";
    rewards.forEach(r => { rh += `<div class="reward-item"><span>${r.text}</span><b>${r.point} ⭐</b></div>`; });
    document.getElementById('rewardList').innerHTML = rh;

    if(isAdmin) renderAdmin();
    updateChart();
}

function action(c, i, s) { logs[c][today()][i].status = s; sync(); }

function calcScore(c) {
    let s = 0;
    if(!logs[c]) return 0;
    for(let d in logs[c]) logs[c][d].forEach(t => { if(t.status==='done') s++; if(t.status==='missed') s--; });
    return s;
}

function updateChart() {
    const ctx = document.getElementById('scoreChart').getContext('2d');
    const now = new Date();
    const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const labels = Array.from({length: days}, (_, i) => i + 1);
    
    document.getElementById('monthLabel').innerText = "Tháng " + (now.getMonth()+1);

    const getPoints = (name) => {
        let current = 0;
        return labels.map(day => {
            const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            if(logs[name] && logs[name][ds]) logs[name][ds].forEach(t => { if(t.status==='done') current++; if(t.status==='missed') current--; });
            return current;
        });
    };

    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'BON', data: getPoints('BON'), borderColor: '#4a90e2', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(74,144,226,0.1)', tension: 0.4 },
                { label: 'BI', data: getPoints('BI'), borderColor: '#e74c3c', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(231,76,60,0.1)', tension: 0.4 }
            ]
        },
        options: { 
            responsive: true, maintainAspectRatio: false, 
            plugins: { legend: { display: false } },
            scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 8 } } } } 
        }
    });
}

function login() { if(prompt("Pass:")==="1") { isAdmin=true; document.getElementById('adminPanel').style.display='block'; render(); } }
function logout() { isAdmin=false; document.getElementById('adminPanel').style.display='none'; }
function showTab(t) {
    document.getElementById('configTab').style.display = t==='config'?'block':'none';
    document.getElementById('approveTab').style.display = t==='approve'?'block':'none';
}

function renderAdmin() {
    const ac = document.getElementById('adminChild').value;
    let ah = "";
    if(logs[ac] && logs[ac][today()]) {
        logs[ac][today()].forEach((t, i) => {
            if(t.status==='pending') {
                ah += `<div class="task"><span>${t.text}</span>
                    <div style="display:flex;gap:5px">
                        <button onclick="action('${ac}',${i},'done')" style="background:var(--success);color:#fff;padding:5px">Duyệt</button>
                        <button onclick="action('${ac}',${i},'missed')" style="background:var(--danger);color:#fff;padding:5px">Phạt</button>
                    </div></div>`;
            }
        });
    }
    document.getElementById('approveList').innerHTML = ah || "Hết việc chờ duyệt";
    document.getElementById('tasksWeekday').value = (taskData[ac].weekday || []).join('\n');
    document.getElementById('tasksWeekend').value = (taskData[ac].weekend || []).join('\n');
}

function saveTasks() {
    const ac = document.getElementById('adminChild').value;
    taskData[ac].weekday = document.getElementById('tasksWeekday').value.split('\n').filter(x=>x.trim());
    taskData[ac].weekend = document.getElementById('tasksWeekend').value.split('\n').filter(x=>x.trim());
    sync(); alert("Xong!");
}
</script>
</body>
</html>
