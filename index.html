<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BON & BI - DASHBOARD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Giao diện Header & Score */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .score-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        
        /* Task & Admin */
        .task { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #f9f9f9; border-left: 5px solid #ddd; }
        .task.done { border-left-color: var(--success); }
        .task.pending { border-left-color: var(--warning); }
        .task.missed { border-left-color: var(--danger); }
        
        button { border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-outline { background: none; border: 1px dashed #ccc; color: #888; width: 100%; margin-top: 20px; }
        
        /* Phần báo cáo */
        .report-section { margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        
        .admin-panel { background: #fff; border: 2px solid var(--dark); padding: 15px; border-radius: 15px; margin-top: 20px; }
        textarea, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" style="text-align:center">🚀 Đang kết nối dữ liệu...</div>
    
    <div id="app" class="hidden">
        <div class="header">
            <div>
                <h2 id="hello" style="margin:0">Chào con!</h2>
                <div id="dateText" style="font-size:0.8em; color:#666"></div>
            </div>
            <img id="avatar" class="avatar" src="" alt="avatar">
        </div>

        <select id="childSelect" onchange="render()">
            <option value="BON">👤 Bé BON</option>
            <option value="BI">👤 Bé BI</option>
        </select>

        <div class="score-box">
            <div style="font-size:0.8em; opacity:0.8">ĐIỂM HIỆN TẠI</div>
            <div style="font-size:2.5em; font-weight:bold" id="totalScore">0</div>
        </div>

        <div id="taskList"></div>

        <div class="report-section">
            <h3 style="margin:0">📊 Báo cáo tháng <span id="monthTitle"></span></h3>
            <div class="stat-grid">
                <div class="stat-card">
                    <div style="font-size:0.7em; color:#666">BON</div>
                    <div style="font-weight:bold; color:var(--primary)" id="statBon">0 đ</div>
                </div>
                <div class="stat-card">
                    <div style="font-size:0.7em; color:#666">BI</div>
                    <div style="font-weight:bold; color:var(--primary)" id="statBi">0 đ</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <button class="btn-outline" onclick="login()">🔐 QUẢN LÝ CHO BỐ MẸ</button>

        <div id="adminArea" class="admin-panel hidden">
            <h3 style="text-align:center">BẢNG ĐIỀU KHIỂN</h3>
            <div style="display:flex; gap:5px">
                <button onclick="showTab('approve')" style="flex:1; background:var(--success); color:white">Duyệt việc</button>
                <button onclick="showTab('config')" style="flex:1; background:#eee">Cài đặt</button>
            </div>
            
            <div id="tabApprove" class="hidden">
                <div id="approveList" style="margin-top:10px"></div>
            </div>

            <div id="tabConfig" class="hidden">
                <label>Việc ngày thường:</label>
                <textarea id="editWeekday" rows="4"></textarea>
                <label>Việc cuối tuần:</label>
                <textarea id="editWeekend" rows="4"></textarea>
                <button class="btn-main" onclick="saveConfig()">LƯU CÀI ĐẶT</button>
            </div>
            <button onclick="location.reload()" style="background:#333; color:white; width:100%; margin-top:10px">THOÁT</button>
        </div>
    </div>
</div>

<script>
// --- CẤU HÌNH ---
const firebaseConfig = {
    apiKey: "AIzaSyCuQCluWc07QOWpAC5lGCxMeOGoujq4k8w",
    authDomain: "bon-bi.firebaseapp.com",
    projectId: "bon-bi",
    storageBucket: "bon-bi.firebasestorage.app",
    messagingSenderId: "988400970351",
    appId: "1:988400970351:web:21e9181950114225417b9a",
    databaseURL: "https://bon-bi-default-rtdb.firebaseio.com/"
};

// ĐIỀN THÔNG TIN TELEGRAM VÀO ĐÂY ĐỂ NHẬN THÔNG BÁO
const TG_TOKEN = ""; 
const TG_CHATID = "";

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const avatars = {
    BON: "https://i.postimg.cc/G9vhLbhg/Bon.jpg",
    BI: "https://i.postimg.cc/hhVPDKP0/Bi.jpg"
};

let taskData = { BON: { weekday: [], weekend: [] }, BI: { weekday: [], weekend: [] } };
let logs = {};
let myChart = null;

// --- ĐỒNG BỘ DỮ LIỆU ---
db.ref('bonbi_data').on('value', (snap) => {
    const data = snap.val();
    if(data) {
        taskData = data.taskData || taskData;
        logs = data.logs || logs;
    }
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    render();
    updateChart();
});

function sync() { db.ref('bonbi_data').set({ taskData, logs }); }

function getDayType() { const d = new Date().getDay(); return (d===0 || d===6) ? 'weekend' : 'weekday'; }
function today() { return new Date().toISOString().split('T')[0]; }

// --- HIỂN THỊ BIỂU ĐỒ ---
function updateChart() {
    const ctx = document.getElementById('myChart').getContext('2d');
    const now = new Date();
    const currentMonth = now.getMonth();
    const daysInMonth = new Date(now.getFullYear(), currentMonth + 1, 0).getDate();
    
    let labels = [];
    let dataBon = [];
    let dataBi = [];
    let totalBon = 0, totalBi = 0;

    for (let i = 1; i <= daysInMonth; i++) {
        labels.push(i);
        let dateStr = `${now.getFullYear()}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        
        let scoreDayBon = 0;
        if(logs.BON && logs.BON[dateStr]) {
            logs.BON[dateStr].forEach(t => { if(t.status==='done') scoreDayBon++; if(t.status==='missed') scoreDayBon--; });
        }
        dataBon.push(scoreDayBon);
        totalBon += scoreDayBon;

        let scoreDayBi = 0;
        if(logs.BI && logs.BI[dateStr]) {
            logs.BI[dateStr].forEach(t => { if(t.status==='done') scoreDayBi++; if(t.status==='missed') scoreDayBi--; });
        }
        dataBi.push(scoreDayBi);
        totalBi += scoreDayBi;
    }

    document.getElementById('monthTitle').innerText = (currentMonth + 1);
    document.getElementById('statBon').innerText = totalBon + " đ";
    document.getElementById('statBi').innerText = totalBi + " đ";

    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'BON', data: dataBon, backgroundColor: '#4a90e2' },
                { label: 'BI', data: dataBi, backgroundColor: '#e74c3c' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}

function render() {
    const c = document.getElementById('childSelect').value;
    const d = today();
    const type = getDayType();
    
    document.getElementById('avatar').src = avatars[c];
    document.getElementById('hello').innerText = "Chào " + c + "!";
    document.getElementById('dateText').innerText = d + (type==='weekend' ? " (Cuối tuần)" : " (Ngày thường)");

    if(!logs[c]) logs[c] = {};
    if(!logs[c][d]) logs[c][d] = (taskData[c][type] || []).map(t => ({text: t, status: 'not'}));

    // Việc của bé
    let h = "";
    logs[c][d].forEach((t, i) => {
        h += `<div class="task ${t.status}">
            <div><b>${t.text}</b><br><small>${t.status.toUpperCase()}</small></div>
            ${t.status==='not' ? `<button onclick="doTask('${c}', ${i})" style="background:var(--primary); color:white; padding:5px 15px">Xong</button>` : ''}
        </div>`;
    });
    document.getElementById('taskList').innerHTML = h;

    // Tổng điểm
    let total = 0;
    for(let k in logs[c]) logs[c][k].forEach(t => { if(t.status==='done') total++; if(t.status==='missed') total--; });
    document.getElementById('totalScore').innerText = total;

    // Admin duyệt
    if(isAdmin) {
        let ah = "";
        logs[c][d].forEach((t, i) => {
            if(t.status === 'pending' || t.status === 'not') {
                ah += `<div class="task">
                    <span>${t.text}</span>
                    <div>
                        <button onclick="approve(${i}, true)" style="background:var(--success); color:white; padding:5px">Duyệt</button>
                        <button onclick="approve(${i}, false)" style="background:var(--danger); color:white; padding:5px">Phạt</button>
                    </div>
                </div>`;
            }
        });
        document.getElementById('approveList').innerHTML = ah || "Hết việc chờ duyệt!";
        document.getElementById('editWeekday').value = taskData[c].weekday.join('\n');
        document.getElementById('editWeekend').value = taskData[c].weekend.join('\n');
    }
}

function doTask(c, i) { 
    logs[c][today()][i].status = 'pending'; 
    sync(); 
    if(TG_TOKEN) sendTG(`📢 Bé ${c} đã làm xong: ${logs[c][today()][i].text}`);
}

function approve(i, ok) { 
    const c = document.getElementById('childSelect').value;
    logs[c][today()][i].status = ok ? 'done' : 'missed'; 
    sync(); 
}

function saveConfig() {
    const c = document.getElementById('childSelect').value;
    taskData[c].weekday = document.getElementById('editWeekday').value.split('\n').filter(x=>x.trim());
    taskData[c].weekend = document.getElementById('editWeekend').value.split('\n').filter(x=>x.trim());
    sync(); alert("Đã lưu!");
}

let isAdmin = false;
function login() { if(prompt("Pass:")==="1") { 
    isAdmin=true; 
    document.getElementById('adminArea').classList.remove('hidden'); 
    showTab('approve');
    render(); 
}}

function showTab(t) {
    document.getElementById('tabApprove').className = t==='approve' ? '' : 'hidden';
    document.getElementById('tabConfig').className = t==='config' ? '' : 'hidden';
}

function sendTG(msg) {
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHATID}&text=${encodeURIComponent(msg)}`);
}
</script>
</body>
</html>
