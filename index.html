<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BON & BI PRO MAX CLOUD</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5406/5406822.png">

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 10px; color: #333; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .avatar-container { text-align: center; margin-bottom: 10px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; background: #eee; }
        
        h1 { text-align: center; color: var(--primary); margin: 10px 0 5px 0; font-size: 1.5em; }
        .day-info { text-align: center; font-weight: bold; color: #666; margin-bottom: 15px; font-size: 0.85em; }
        
        select, input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 16px; }
        button:active { transform: scale(0.96); }
        
        .btn-main { background: var(--primary); color: white; }
        .btn-admin { background: none; color: #bbb; border: 1px dashed #ddd; margin-top: 30px; font-size: 0.8em; }
        
        .task { display: flex; align-items: center; justify-content: space-between; padding: 15px; margin-top: 10px; border-radius: 12px; border-left: 6px solid #ddd; background: #f9f9f9; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .task.done { border-left-color: var(--success); background: #f0fff4; }
        .task.pending { border-left-color: var(--warning); background: #fffdf0; }
        .task.missed { border-left-color: var(--danger); background: #fff5f5; opacity: 0.9; }
        
        .task-info { flex-grow: 1; margin-right: 10px; }
        .task-status { font-size: 0.7em; font-weight: bold; text-transform: uppercase; margin-top: 4px; color: #888; }
        .btn-action { width: auto; padding: 8px 18px; margin: 0; font-size: 0.9em; }
        .btn-redo { background: #eee; color: #666; font-size: 0.7em; padding: 4px 8px; width: auto; margin-top: 5px; }

        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 15px; border: 2px solid #ddd; margin-top: 20px; }
        .score-board { background: linear-gradient(135deg, var(--primary) 0%, #357abd 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin: 15px 0; }
        .reward-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .tab-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .loading { text-align: center; color: var(--primary); font-weight: bold; padding: 50px; }
        .report-box { margin-top: 30px; padding-top: 20px; border-top: 2px solid #f0f2f5; }
    </style>
</head>
<body>

<div id="loading" class="loading">🚀 Đang tải dữ liệu của Bon & Bi...</div>

<div class="container" id="mainApp" style="display:none">
    <div class="avatar-container">
        <img id="childAvatar" class="avatar" src="" alt="Avatar">
    </div>
    <h1 id="greeting">BÉ BON & BI</h1>
    <div id="displayDate" class="day-info"></div>

    <label style="font-size: 0.8em; color: #888; margin-left: 5px;">👤 ĐANG XEM:</label>
    <select id="childSelect" onchange="render()">
        <option value="BON">Bé BON</option>
        <option value="BI">Bé BI</option>
    </select>

    <div class="score-board">
        <div style="font-size: 0.8em; opacity: 0.9; letter-spacing: 1px;">ĐIỂM TÍCH LŨY</div>
        <div style="font-size: 3em; font-weight: bold;"><span id="score">0</span> ⭐</div>
    </div>

    <div id="taskList"></div>

    <h3 style="margin-top: 25px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px;">🎁 Quà của bé</h3>
    <div id="rewardList"></div>

    <div class="report-box">
        <h3 style="text-align: center; font-size: 1em;">📊 Theo dõi tháng này</h3>
        <canvas id="scoreChart" style="width:100%; height:200px"></canvas>
    </div>

    <button class="btn-admin" onclick="login()">🔐 CHẾ ĐỘ QUẢN LÝ</button>

    <div id="adminPanel" style="display:none" class="admin-box">
        <h3 style="text-align:center; margin-top:0">🛠 QUẢN LÝ: 
            <select id="adminChild" onchange="render()" style="width:auto; display:inline; padding:5px">
                <option value="BON">BON</option>
                <option value="BI">BI</option>
            </select>
        </h3>
        
        <div class="tab-group">
            <button onclick="showTab('config')" style="background:#eee; flex:1">Cài việc</button>
            <button onclick="showTab('approve')" style="background:var(--success); color:white; flex:1">Duyệt việc</button>
        </div>

        <div id="configTab">
            <p style="margin-bottom:5px"><b>📝 Việc Ngày Thường:</b></p>
            <textarea id="tasksWeekday" rows="4" placeholder="Ví dụ:&#10;Đánh răng&#10;Học bài"></textarea>
            <p style="margin-bottom:5px"><b>🎉 Việc Cuối Tuần:</b></p>
            <textarea id="tasksWeekend" rows="4" placeholder="Ví dụ:&#10;Quét nhà&#10;Tưới cây"></textarea>
            <button class="btn-main" onclick="saveTasks()">LƯU LÊN CLOUD</button>
            <hr style="margin:20px 0; border:0; border-top:1px solid #ddd">
            <p style="margin-bottom:5px"><b>🎁 Thêm phần thưởng:</b></p>
            <input id="rewardText" placeholder="Tên món quà">
            <input id="rewardPoint" type="number" placeholder="Số điểm cần">
            <button class="btn-main" style="background:#e67e22" onclick="addReward()">THÊM QUÀ</button>
        </div>

        <div id="approveTab" style="display:none">
            <h4 style="margin-top:0">✅ Chờ duyệt hôm nay:</h4>
            <div id="approveList"></div>
        </div>

        <button onclick="logout()" style="background:#333; color:white; margin-top:20px">ĐÓNG QUẢN LÝ</button>
    </div>
</div>

<script>
// --- CẤU HÌNH FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyCuQCluWc07QOWpAC5lGCxMeOGoujq4k8w",
  authDomain: "bon-bi.firebaseapp.com",
  projectId: "bon-bi",
  storageBucket: "bon-bi.firebasestorage.app",
  messagingSenderId: "988400970351",
  appId: "1:988400970351:web:21e9181950114225417b9a",
  measurementId: "G-TNPNS19WYL",
  databaseURL: "https://bon-bi-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const PASSWORD = "1";
let isAdmin = false;
let myChart = null;

const childAvatars = {
    BON: "https://i.postimg.cc/G9vhLbhg/Bon.jpg", 
    BI: "https://i.postimg.cc/hhVPDKP0/Bi.jpg"
};

let taskData = {
    BON: { weekday: ["Đánh răng", "Học bài"], weekend: ["Dọn đồ chơi"] },
    BI: { weekday: ["Ăn sáng", "Học tiếng Anh"], weekend: ["Tưới cây"] }
};
let logs = {};
let rewards = [{text: "Kem ốc quế", point: 5}, {text: "Đi công viên", point: 10}];

db.ref('bonbi_data').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        if(data.taskData) taskData = data.taskData;
        if(data.logs) logs = data.logs;
        if(data.rewards) rewards = data.rewards;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    render();
});

function sync() {
    db.ref('bonbi_data').set({ taskData, logs, rewards });
}

function getDayType() {
    const day = new Date().getDay();
    return (day === 0 || day === 6) ? 'weekend' : 'weekday';
}
function today() { return new Date().toISOString().split('T')[0]; }

function ensureToday(c) {
    let d = today();
    let type = getDayType();
    if(!logs[c]) logs[c] = {};
    if(!logs[c][d]) {
        logs[c][d] = (taskData[c][type] || []).map(t => ({text: t, status: 'not'}));
    }
}

// --- HÀNH ĐỘNG ---
function clickTask(i) {
    let c = document.getElementById('childSelect').value;
    logs[c][today()][i].status = 'pending';
    sync();
}

// Hàm cho con sửa lại lựa chọn
function redoTask(i) {
    let c = document.getElementById('childSelect').value;
    if(logs[c][today()][i].status === 'pending') {
        logs[c][today()][i].status = 'not';
        sync();
    }
}

function approveTask(i) {
    let ac = document.getElementById('adminChild').value;
    logs[ac][today()][i].status = 'done';
    sync();
}

function failTask(i) {
    let ac = document.getElementById('adminChild').value;
    if(confirm("Xác nhận bé quên làm và TRỪ 1 điểm?")) {
        logs[ac][today()][i].status = 'missed';
        sync();
    }
}

function saveTasks() {
    let ac = document.getElementById('adminChild').value;
    taskData[ac].weekday = document.getElementById('tasksWeekday').value.split('\n').filter(x => x.trim());
    taskData[ac].weekend = document.getElementById('tasksWeekend').value.split('\n').filter(x => x.trim());
    sync();
    alert("Đã cập nhật việc cho " + ac);
}

function addReward() {
    let t = document.getElementById('rewardText').value;
    let p = parseInt(document.getElementById('rewardPoint').value);
    if(t && p) {
        rewards.push({text: t, point: p});
        sync();
        document.getElementById('rewardText').value = '';
        document.getElementById('rewardPoint').value = '';
    }
}

function login() {
    if(prompt("Mật khẩu bố mẹ:") === PASSWORD) {
        isAdmin = true;
        document.getElementById('adminPanel').style.display = 'block';
        render();
    }
}
function logout() { isAdmin = false; document.getElementById('adminPanel').style.display = 'none'; render();}
function showTab(tab) {
    document.getElementById('configTab').style.display = tab === 'config' ? 'block' : 'none';
    document.getElementById('approveTab').style.display = tab === 'approve' ? 'block' : 'none';
}

function calcScore(c) {
    let total = 0;
    if(!logs[c]) return 0;
    for(let d in logs[c]) {
        logs[c][d].forEach(t => { 
            if(t.status === 'done') total++; 
            if(t.status === 'missed') total--; 
        });
    }
    return total;
}

// Vẽ biểu đồ
function updateChart() {
    const ctx = document.getElementById('scoreChart').getContext('2d');
    const now = new Date();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);

    const getData = (child) => {
        let currentTotal = 0;
        return labels.map(day => {
            const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            if (logs[child] && logs[child][dateStr]) {
                logs[child][dateStr].forEach(t => {
                    if(t.status === 'done') currentTotal++;
                    if(t.status === 'missed') currentTotal--;
                });
            }
            return currentTotal;
        });
    };

    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'BON', data: getData('BON'), borderColor: '#4a90e2', tension: 0.3 },
                { label: 'BI', data: getData('BI'), borderColor: '#e74c3c', tension: 0.3 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });
}

function render() {
    let c = document.getElementById('childSelect').value;
    let d = today();
    let type = getDayType();
    
    document.getElementById('childAvatar').src = childAvatars[c];
    document.getElementById('greeting').innerText = "BÉ " + c;
    document.getElementById('displayDate').innerText = (type === 'weekend' ? "🎉 Cuối tuần" : "📅 Ngày thường") + " - " + d;
    
    ensureToday(c);

    let list = document.getElementById('taskList');
    list.innerHTML = '<h3 style="font-size: 1em">📝 Việc cần làm:</h3>';
    logs[c][d].forEach((t, i) => {
        let div = document.createElement('div');
        div.className = `task ${t.status}`;
        let st = {
            'done': '✅ Đã hoàn thành!',
            'pending': '⏳ Đợi bố mẹ duyệt...',
            'missed': '❌ Quên làm (Bị trừ điểm)',
            'not': '⭕ Chưa xong'
        }[t.status];
        
        div.innerHTML = `
            <div class="task-info">
                <b>${t.text}</b>
                <div class="task-status">${st}</div>
                ${t.status === 'pending' ? `<button class="btn-redo" onclick="redoTask(${i})">↩ Làm lại/Sửa</button>` : ''}
            </div>
            ${t.status === 'not' ? `<button class="btn-action btn-main" onclick="clickTask(${i})">Xong</button>` : ''}
        `;
        list.appendChild(div);
    });

    if(isAdmin) {
        let ac = document.getElementById('adminChild').value;
        ensureToday(ac);
        let appList = document.getElementById('approveList');
        appList.innerHTML = '';
        logs[ac][d].forEach((t, i) => {
            if(t.status !== 'done' && t.status !== 'missed') {
                let div = document.createElement('div');
                div.className = 'task ' + t.status;
                div.innerHTML = `<div style="flex:1"><b>${t.text}</b></div>
                    <div style="display:flex; gap:5px">
                        <button class="btn-action" style="background:var(--success); color:white" onclick="approveTask(${i})">Duyệt</button>
                        <button class="btn-action" style="background:var(--danger); color:white" onclick="failTask(${i})">Phạt</button>
                    </div>`;
                appList.appendChild(div);
            }
        });
        document.getElementById('tasksWeekday').value = (taskData[ac].weekday || []).join('\n');
        document.getElementById('tasksWeekend').value = (taskData[ac].weekend || []).join('\n');
    }

    let score = calcScore(c);
    document.getElementById('score').innerText = score;
    let rdiv = document.getElementById('rewardList');
    rdiv.innerHTML = '';
    rewards.forEach(r => {
        let can = score >= r.point;
        rdiv.innerHTML += `<div class="reward-item">
            <span>${can ? '🎁' : '🔒'} ${r.text}</span>
            <b style="color:${can ? 'var(--success)' : '#999'}">${r.point} ⭐</b>
        </div>`;
    });
    
    updateChart();
}
</script>
</body>
</html>
