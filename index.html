<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BON & BI - DASHBOARD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; background: #fff; padding: 20px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* Header */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; background: #eee; }
        
        /* Điểm số */
        .score-card { background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%); color: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .score-card h2 { margin: 5px 0 0 0; font-size: 2.5em; }

        /* Công việc */
        .task { display: flex; align-items: center; padding: 15px; margin-bottom: 10px; border-radius: 15px; background: #f9f9f9; border-left: 5px solid #ddd; }
        .task.done { border-left-color: var(--success); background: #f0fff4; }
        .task.pending { border-left-color: var(--warning); background: #fffdf0; }
        .task-info { flex: 1; }
        .task-info b { font-size: 1em; color: #333; }
        .task-status { font-size: 0.75em; display: block; margin-top: 3px; font-weight: bold; }

        /* Nút bấm */
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-xong { background: var(--primary); color: white; padding: 10px 20px; }
        .btn-redo { background: #eee; color: #666; font-size: 0.7em; padding: 5px 10px; margin-top: 5px; }

        /* Báo cáo */
        .chart-section { margin-top: 25px; padding: 15px; background: #fff; border-radius: 20px; border: 1px solid #eee; }
        .chart-container { height: 160px; width: 100%; }

        select { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; background: #fff; }
        .reward-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 0.95em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img id="childAvatar" class="avatar" src="https://i.postimg.cc/G9vhLbhg/Bon.jpg">
        <div>
            <h2 id="greeting" style="margin:0">Chào con!</h2>
            <small id="displayDate" style="color:#888; font-weight: bold;"></small>
        </div>
    </div>

    <select id="childSelect" onchange="render()">
        <option value="BON">👤 Bé BON</option>
        <option value="BI">👤 Bé BI</option>
    </select>

    <div class="score-card">
        <small style="opacity:0.9; letter-spacing:1px">ĐIỂM TÍCH LŨY</small>
        <h2 id="score">0 ⭐</h2>
    </div>

    <div id="taskList"></div>

    <div style="margin-top:20px">
        <h3 style="font-size:1.1em; border-left:4px solid var(--warning); padding-left:10px">🎁 Quà mục tiêu</h3>
        <div id="rewardList" style="background:#fffaf0; border-radius:15px; padding:5px"></div>
    </div>

    <div class="chart-section">
        <b style="font-size:0.85em; color:#555">📊 TIẾN ĐỘ THÁNG NÀY</b>
        <div class="chart-container"><canvas id="myChart"></canvas></div>
    </div>

    <button onclick="login()" style="background:none; color:#bbb; width:100%; margin-top:25px; font-size:0.8em">🔐 Chế độ Bố Mẹ</button>

    <div id="adminPanel" style="display:none; background:#f9f9f9; padding:20px; border-radius:20px; margin-top:20px; border:1px dashed #ccc">
        <h3 style="text-align:center; margin-top:0">🛠 QUẢN LÝ</h3>
        <select id="adminChild" onchange="render()">
            <option value="BON">Cài việc BON</option>
            <option value="BI">Cài việc BI</button>
        </select>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button onclick="showTab('config')" style="flex:1; padding:10px; background:#eee">Cài việc</button>
            <button onclick="showTab('approve')" style="flex:1; padding:10px; background:var(--success); color:white">Duyệt việc</button>
        </div>
        <div id="configTab">
            <textarea id="tasksWeekday" rows="4" style="width:100%; border-radius:10px; padding:10px; margin-bottom:10px" placeholder="Việc ngày thường..."></textarea>
            <textarea id="tasksWeekend" rows="4" style="width:100%; border-radius:10px; padding:10px; margin-bottom:10px" placeholder="Việc cuối tuần..."></textarea>
            <button onclick="saveTasks()" style="background:var(--primary); color:white; width:100%; padding:15px">LƯU CÀI ĐẶT</button>
        </div>
        <div id="approveTab" style="display:none"><div id="approveList"></div></div>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; margin-top:15px; background:#333; color:white; padding:10px">THOÁT</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuQCluWc07QOWpAC5lGCxMeOGoujq4k8w",
  authDomain: "bon-bi.firebaseapp.com",
  projectId: "bon-bi",
  storageBucket: "bon-bi.firebasestorage.app",
  messagingSenderId: "988400970351",
  appId: "1:988400970351:web:21e9181950114225417b9a",
  databaseURL: "https://bon-bi-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myChart = null, isAdmin = false;

const avatars = { BON: "https://i.postimg.cc/G9vhLbhg/Bon.jpg", BI: "https://i.postimg.cc/hhVPDKP0/Bi.jpg" };
let taskData = { BON: { weekday: [], weekend: [] }, BI: { weekday: [], weekend: [] } };
let logs = {}, rewards = [{t:"Ăn kem", p:20}, {t:"Uống nước cam", p:50}, {t:"Mua đồ chơi", p:500}];

// ĐỒNG BỘ DỮ LIỆU - SỬ DỤNG LẠI bonbi_data ĐỂ HIỆN LẠI VIỆC CŨ
db.ref('bonbi_data').on('value', (snap) => {
    const data = snap.val();
    if (data) {
        if(data.taskData) taskData = data.taskData;
        if(data.logs) logs = data.logs;
        render();
    }
});

function sync() { db.ref('bonbi_data').set({ taskData, logs, rewards }); }
function today() { return new Date().toISOString().split('T')[0]; }
function isWeekend() { const d = new Date().getDay(); return (d===0 || d===6); }

function render() {
    const c = document.getElementById('childSelect').value;
    const d = today();
    const type = isWeekend() ? 'weekend' : 'weekday';
    
    document.getElementById('childAvatar').src = avatars[c];
    document.getElementById('displayDate').innerText = (isWeekend() ? "🎉 Cuối tuần" : "📅 Ngày thường") + " - " + d;
    document.getElementById('greeting').innerText = "Chào " + c + "!";

    if(!logs[c]) logs[c] = {};
    if(!logs[c][d]) {
        logs[c][d] = (taskData[c][type] || []).map(t => ({text: t, status: 'not'}));
    }

    let h = "";
    logs[c][d].forEach((t, i) => {
        h += `<div class="task ${t.status}">
            <div class="task-info">
                <b>${t.text}</b>
                <span class="task-status" style="color:${t.status==='done'?'#2ecc71':t.status==='pending'?'#f1c40f':'#999'}">
                    ${t.status==='done'?'✅ HOÀN THÀNH':t.status==='pending'?'⏳ ĐANG CHỜ DUYỆT':'⭕ CHƯA XONG'}
                </span>
                ${t.status==='pending' ? `<button class="btn-redo" onclick="setStatus('${c}','${d}',${i},'not')">Sửa lại</button>` : ''}
            </div>
            ${t.status==='not' ? `<button class="btn-xong" onclick="setStatus('${c}','${d}',${i},'pending')">Xong!</button>` : ''}
        </div>`;
    });
    document.getElementById('taskList').innerHTML = h || "<p style='text-align:center;color:#999'>Chưa có việc được giao</p>";

    let score = 0;
    for(let date in logs[c]) {
        logs[c][date].forEach(t => { if(t.status==='done') score++; if(t.status==='missed') score--; });
    }
    document.getElementById('score').innerText = score + " ⭐";

    let rh = "";
    rewards.forEach(r => {
        rh += `<div class="reward-item"><span>${score >= r.p ? '🎁':'🔒'} ${r.t}</span><b>${r.p}đ</b></div>`;
    });
    document.getElementById('rewardList').innerHTML = rh;

    if(isAdmin) renderAdmin();
    drawChart();
}

function setStatus(c, d, i, s) { logs[c][d][i].status = s; sync(); }

function drawChart() {
    const ctx = document.getElementById('myChart').getContext('2d');
    const labels = [], dataBon = [], dataBi = [];
    const now = new Date();
    for(let i=1; i<=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate(); i++) {
        labels.push(i);
        const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const getDayScore = (name) => {
            let s = 0;
            if(logs[name] && logs[name][ds]) logs[name][ds].forEach(t => { if(t.status==='done') s++; });
            return s;
        };
        dataBon.push(getDayScore('BON'));
        dataBi.push(getDayScore('BI'));
    }

    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'BON', data: dataBon, borderColor: '#4a90e2', tension: 0.4, pointRadius: 0 },
                { label: 'BI', data: dataBi, borderColor: '#e74c3c', tension: 0.4, pointRadius: 0 }
            ]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 8 } } } }
        }
    });
}

function login() { if(prompt("Mật khẩu:")==="1") { isAdmin=true; document.getElementById('adminPanel').style.display='block'; render(); } }
function showTab(t) {
    document.getElementById('configTab').style.display = t==='config'?'block':'none';
    document.getElementById('approveTab').style.display = t==='approve'?'block':'none';
}

function renderAdmin() {
    const ac = document.getElementById('adminChild').value;
    let ah = "";
    if(logs[ac] && logs[ac][today()]) {
        logs[ac][today()].forEach((t, i) => {
            if(t.status==='pending') {
                ah += `<div class="task"><b>${t.text}</b>
                    <div style="display:flex;gap:5px">
                        <button onclick="setStatus('${ac}','${today()}',${i},'done')" style="background:var(--success);color:white;padding:5px 10px">Duyệt</button>
                        <button onclick="setStatus('${ac}','${today()}',${i},'missed')" style="background:var(--danger);color:white;padding:5px 10px">Phạt</button>
                    </div></div>`;
            }
        });
    }
    document.getElementById('approveList').innerHTML = ah || "Không có việc chờ duyệt";
    document.getElementById('tasksWeekday').value = (taskData[ac].weekday || []).join('\n');
    document.getElementById('tasksWeekend').value = (taskData[ac].weekend || []).join('\n');
}

function saveTasks() {
    const ac = document.getElementById('adminChild').value;
    taskData[ac].weekday = document.getElementById('tasksWeekday').value.split('\n').filter(x=>x.trim());
    taskData[ac].weekend = document.getElementById('tasksWeekend').value.split('\n').filter(x=>x.trim());
    sync(); alert("Đã lưu!");
}
</script>
</body>
</html>
